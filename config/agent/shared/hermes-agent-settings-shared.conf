# Hermes Agent runtime and build configuration.
# Scripts and shell helpers must read these values instead of embedding repo config.
HERMES_AGENT_IMAGE_BASENAME="hermes-agent"
HERMES_AGENT_UID="${HERMES_AGENT_UID:-$(id -u)}"
HERMES_AGENT_GID="${HERMES_AGENT_GID:-$(id -g)}"
HERMES_AGENT_NODE_IMAGE="node:24-bookworm-slim"
HERMES_AGENT_RUNTIME_IMAGE="ubuntu:24.04"
HERMES_AGENT_VERSION="0.10.0"
HERMES_AGENT_RELEASE_TAG="v2026.4.16"
HERMES_AGENT_DASHBOARD_PORT="9119"
HERMES_AGENT_CHAT_COMMAND="hermes"
HERMES_AGENT_SHELL_COMMAND="bash"
# Browser opener command on the host. Use auto to resolve a supported opener.
HERMES_AGENT_OPEN_COMMAND="auto"
# Host paths live under the current user's home directory so the default stays portable.
HERMES_AGENT_BASE_PATH="${HOME}/Documents/Ezirius/.applications-data/.containers-artificial-intelligence"
# Space-separated workspace:port-offset pairs drive menu selection and host port offsets.
HERMES_AGENT_WORKSPACES="ezirius:10000 nala:20000"
HERMES_AGENT_CONTAINER_HOME="/home/hermes-agent"
# The in-container workspace stays fixed so host mounts only vary by selected workspace.
HERMES_AGENT_CONTAINER_WORKSPACE="/workspace/general"
HERMES_AGENT_HOST_HOME_DIRNAME="hermes-agent-home"
HERMES_AGENT_HOST_WORKSPACE_DIRNAME="hermes-agent-general"
