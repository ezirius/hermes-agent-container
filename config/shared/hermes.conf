HERMES_IMAGE_NAME="hermes-agent-local"
HERMES_PROJECT_PREFIX="hermes-agent"
HERMES_LABEL_NAMESPACE="hermes.wrapper"
HERMES_LABEL_WORKSPACE="hermes.wrapper.workspace"
HERMES_LABEL_LANE="hermes.wrapper.lane"
HERMES_LABEL_UPSTREAM="hermes.wrapper.upstream"
HERMES_LABEL_WRAPPER="hermes.wrapper.context"
HERMES_LABEL_COMMITSTAMP="hermes.wrapper.commitstamp"
HERMES_REPO_URL="https://github.com/NousResearch/hermes-agent.git"
HERMES_GITHUB_API_BASE="https://api.github.com"
HERMES_LANE_PRODUCTION="production"
HERMES_LANE_TEST="test"
HERMES_DEFAULT_UPSTREAM_SELECTOR="latest"
HERMES_UPSTREAM_MAIN_SELECTOR="main"
HERMES_RELEASE_TAG_PREFIX="v"
HERMES_BASE_ROOT="$HOME/Documents/Ezirius/.applications-data/.containers-artificial-intelligence"
HERMES_WORKSPACE_HOME_DIRNAME="hermes-home"
HERMES_WORKSPACE_DIRNAME="hermes-workspace"
HERMES_CONTAINER_RUNTIME_HOME="/home/hermes"
HERMES_CONTAINER_WORKSPACE_DIR="/workspace/hermes-workspace"
HERMES_CONTAINER_RESTART_POLICY="unless-stopped"
HERMES_PODMAN_TTY_WRAPPER="auto"
